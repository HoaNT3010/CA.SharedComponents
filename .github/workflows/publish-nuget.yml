name: Publish NuGet Packages

on:
  push:
    tags:
      - 'v*' # Triggers whenever push a tag like v1.0.0 or v2.1.5

jobs:
  build-and-publish:
    name: Publish NuGet Packages
    runs-on: ubuntu-latest
    
    # Ensures the workflow has permission to read the code
    permissions:
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Fetches all history for accurate versioning if needed

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Build Solution
        run: dotnet build --no-restore --configuration Release

      # Runs tests to ensure not publishing broken packages
      - name: Run Tests
        run: dotnet test --configuration Release --no-build --verbosity normal

      - name: Pack All Projects
        # This packs all .csproj files and overrides their version with the Tag name
        # The #v syntax removes the 'v' prefix from the tag (v1.2.3 -> 1.2.3)
        run: |
          dotnet pack CA.SharedComponents.slnx \
          --configuration Release \
          --no-build \
          --output ./nupkg-dist \
          -p:PackageVersion=${GITHUB_REF_NAME#v}

      - name: Push to NuGet.org
        # The --skip-duplicate flag is vital if some projects haven't changed
        # but we are pushing the whole batch.
        run: |
          dotnet nuget push "./nupkg-dist/*.nupkg" \
          --api-key ${{ secrets.NUGET_API_KEY }} \
          --source https://api.nuget.org/v3/index.json \
          --skip-duplicate